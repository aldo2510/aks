name: DAST API Security - crAPI with ZAP

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  zap-crapi:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download crAPI compose files
        run: |
          curl -L -o docker-compose.yml https://raw.githubusercontent.com/OWASP/crAPI/main/deploy/docker/docker-compose.yml
          curl -L -o .env https://raw.githubusercontent.com/OWASP/crAPI/main/deploy/docker/.env

      - name: Start crAPI
        run: |
          docker compose --compatibility up -d

      - name: Wait for crAPI
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8888 >/dev/null; then
              echo "crAPI is up"
              exit 0
            fi
            echo "Waiting for crAPI..."
            sleep 10
          done
          echo "crAPI did not start in time"
          docker compose ps
          docker compose logs --tail=200
          exit 1

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: 'http://localhost:8888'
          cmd_options: '-a -m 15'
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-full-scan-report

      - name: Save container logs on failure
        if: failure()
        run: docker compose logs --tail=300

      - name: Stop crAPI
        if: always()
        run: docker compose down -v
