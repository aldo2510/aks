name: ZAP Security Scan

on:
  workflow_dispatch:
  push:

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create docker network
        run: docker network create zapnet

      - name: Start Juice Shop
        run: |
          docker run -d \
          --name juice \
          --network zapnet \
          -p 3000:3000 \
          bkimminich/juice-shop

      - name: Wait for Juice Shop
        run: sleep 40

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: 'http://juice:3000'
          cmd_options: '--network zapnet -j -a -m 25 -z "-config scanner.attackStrength=HIGH -config scanner.alertThreshold=LOW"'
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-full-scan-report

