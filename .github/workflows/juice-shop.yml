name: ZAP Security Scan

on:
  workflow_dispatch:
  push:

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create docker network
        run: docker network create zapnet

      - name: Start Juice Shop
        run: |
          docker run -d \
          --name juice \
          --network zapnet \
          -p 3000:3000 \
          bkimminich/juice-shop

      - name: Wait for Juice Shop
        run: sleep 40

      - name: Run ZAP Full Scan
        run: |
          docker run --rm \
          --network zapnet \
          -v $(pwd):/zap/wrk \
          zaproxy/zap-stable \
          zap-full-scan.py \
          -t http://juice:3000 \
          -a \
          -j \
          -m 25 \
          -z "-config scanner.attackStrength=HIGH -config scanner.alertThreshold=LOW" \
          -r zap-report.html

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html
